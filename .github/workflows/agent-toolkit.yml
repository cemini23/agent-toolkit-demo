name: Agent toolkit CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  vet-good-skill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cemini23/vet@v0.2.0
        with:
          path: skills/good-skill/SKILL.md
          profile: skillmd
          strict: "true"

  vet-cursor-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cemini23/vet@v0.2.0
        with:
          path: skills/cursor-audit/SKILL.md
          profile: skillmd
          strict: "true"

  vet-bad-skill-should-fail:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cemini23/vet@v0.2.0
        with:
          path: skills/bad-skill/SKILL.md
          profile: skillmd
          strict: "true"
        continue-on-error: true
        id: vet_bad
      - run: test "${{ steps.vet_bad.outcome }}" = "failure"

  vet-good-brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cemini23/vet@v0.2.0
        with:
          path: briefs/good-brief.md
          profile: brief
          root: .
          strict: "true"

  wikilint-wiki:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cemini23/wikilint@v0.1.0
        with:
          wiki-dir: wiki
          strict: "false"

  phase0-detects-eval-mismatch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: cemini23/phase0@v0.2.0
        with:
          command: verify-eval
          target: evals/sample-eval.md
        continue-on-error: true
        id: phase0_eval
      - run: test "${{ steps.phase0_eval.outcome }}" = "failure"
